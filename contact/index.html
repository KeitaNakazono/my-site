<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="中薗圭汰へのお問い合わせはこちら。健康運動指導・地域コミュニティ活動・Web制作・AI活用についてお気軽にご連絡ください。">
  <meta property="og:title" content="Contact | 中薗 圭汰 へのお問い合わせ">
  <meta property="og:description" content="中薗圭汰へのお問い合わせフォームです。お気軽にご連絡ください。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://keita-works.com/contact">
  <meta property="og:image" content="https://keita-works.com/ogimage.png">
  <meta property="og:site_name" content="KEITA WORKS">
  <meta property="og:locale" content="ja_JP">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Contact | 中薗 圭汰 へのお問い合わせ">
  <meta name="twitter:description" content="中薗圭汰へのお問い合わせフォームです。お気軽にご連絡ください。">
  <meta name="twitter:image" content="https://keita-works.com/ogimage.png">
  <meta name="author" content="中薗圭汰">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://keita-works.com/contact">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="/" class="nav-logo">Keita Nakazono</a>
      <ul class="nav-links">
        <li><a href="/about">About</a></li>
        <li class="has-dropdown">
          <a href="/service">Service <span class="nav-arrow">▾</span></a>
          <ul class="nav-dropdown">
            <li><a href="/service#health">健康運動指導</a></li>
            <li><a href="/service#community">地域コミュニティ</a></li>
            <li><a href="/service#ai-web">AI・Web技術</a></li>
          </ul>
        </li>
        <li><a href="/works">Works</a></li>
        <li><a href="/activities">Activities</a></li>
        <li><a href="/contact">Contact</a></li>
      </ul>
    </div>
  </nav>

  <section class="section contact-section" style="padding-top: 140px;">
    <div class="container contact-container">
      <p class="section-label section-label--light">Contact</p>
      <h1 class="section-title section-title--light">お問い合わせ</h1>
      <p class="contact-lead">
        まずは自分を知ってもらうためのサイトです。<br>
        気軽に見ていただけると嬉しいです。ご連絡もお待ちしています。
      </p>

      <form class="contact-form" name="contact" method="POST" data-netlify="true" action="/thanks.html">
        <input type="hidden" name="form-name" value="contact">
        <div class="form-group">
          <label for="name">お名前 <span class="required">必須</span></label>
          <input type="text" id="name" name="name" placeholder="山田 太郎" required>
        </div>
        <div class="form-group">
          <label for="email">メールアドレス <span class="required">必須</span></label>
          <input type="email" id="email" name="email" placeholder="example@mail.com" required>
        </div>
        <div class="form-group">
          <label for="message">お問い合わせ内容 <span class="required">必須</span></label>
          <textarea id="message" name="message" rows="6" placeholder="お気軽にご記入ください。" required></textarea>
        </div>
        <div class="form-submit">
          <button type="submit" class="btn-outline btn-outline--light btn-contact">
            送信する <span class="arrow">→</span>
          </button>
        </div>
      </form>

      <div class="contact-sns">
        <a href="#" class="sns-link">X（Twitter）</a>
        <span class="sns-sep">/</span>
        <a href="#" class="sns-link">GitHub</a>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-inner">
      <a href="/" class="footer-logo">Keita Nakazono</a>
      <p class="footer-copy">© 2026 中薗 圭汰</p>
    </div>
  </footer>

</body>
</html>
