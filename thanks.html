<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>送信完了 | 中薗 圭汰</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .thanks-page {
      min-height: 100vh;
      background: linear-gradient(135deg, #0a1432 0%, #0f2a5e 55%, #0d3880 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }
    .thanks-box {
      color: #fff;
    }
    .thanks-icon {
      font-size: 3.5rem;
      margin-bottom: 24px;
      display: block;
    }
    .thanks-title {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .thanks-text {
      color: rgba(255,255,255,0.7);
      font-size: 0.95rem;
      line-height: 1.9;
      margin-bottom: 40px;
    }
  </style>
</head>
<body>
  <div class="thanks-page">
    <div class="thanks-box">
      <span class="thanks-icon">✅</span>
      <h1 class="thanks-title">送信が完了しました</h1>
      <p class="thanks-text">
        お問い合わせありがとうございます。<br>
        内容を確認のうえ、折り返しご連絡いたします。
      </p>
      <a href="/" class="btn-outline btn-outline--light">
        トップページへ戻る <span class="arrow">→</span>
      </a>
    </div>
  </div>
</body>
</html>
